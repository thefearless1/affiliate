<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopPicks — Best Software & Apps Reviewed</title>
  <meta name="description" content="Honest, hands-on top-5 lists for the software and apps that actually matter. Photo editors, audio tools, mobile apps and more." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="site-wrapper">
      <a class="site-logo" href="index.html">Top<span>Picks</span></a>
    </div>
  </header>

  <main>
    <div class="site-wrapper">

      <!-- Latest Posts -->
      <section id="categories">
        <p class="section-title">Latest Lists</p>
        <div class="post-list" id="post-list"></div>
      </section>

    </div>
  </main>

  <script src="db/alltops.js"></script>
  <script>
  (function () {
    var list = document.getElementById('post-list');
    var sorted = allTops.slice().sort(function (a, b) {
      return b.date.localeCompare(a.date);
    });
    sorted.forEach(function (top) {
      var date = new Date(top.date + 'T00:00:00');
      var dateDisplay = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      var article = document.createElement('article');
      article.className = 'post-card';
      article.innerHTML =
        '<div class="post-card-icon">' + top.icon + '</div>' +
        '<div class="post-card-body">' +
          '<div class="post-card-meta"><span class="tag">' + top.tag + '</span> ' + dateDisplay + '</div>' +
          '<h2 class="post-card-title"><a href="tops/' + top.url + '">' + top.title + '</a></h2>' +
          '<p class="post-card-excerpt">' + top.excerpt + '</p>' +
        '</div>' +
        '<div class="post-card-arrow">›</div>';
      list.appendChild(article);
    });
  })();
  </script>

  <footer class="site-footer">
    <div class="site-wrapper">
      <p>&copy; 2026 TopPicks. All rights reserved.</p>
      <p>Some links are affiliate links. <a href="#">Privacy Policy</a> · <a href="#">Disclosure</a></p>
    </div>
  </footer>

</body>
</html>
