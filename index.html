<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopPicks — Best Software & Apps Reviewed</title>
  <meta name="description" content="Honest, hands-on top-5 lists for the software and apps that actually matter. Photo editors, audio tools, mobile apps and more." />
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));</script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="site-wrapper">
      <a class="site-logo" href="index.html">Top<span>Picks</span></a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div class="site-wrapper">

      <!-- Latest Posts -->
      <section id="categories">
        <p class="section-title">Latest Lists</p>
        <div class="post-list" id="post-list"></div>
      </section>

    </div>
  </main>

  <script>document.getElementById('theme-toggle').addEventListener('click',function(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);});</script>
  <script src="db/alltops.js"></script>
  <script>
  (function () {
    var list = document.getElementById('post-list');
    var sorted = allTops.slice().sort(function (a, b) {
      return b.date.localeCompare(a.date);
    });
    sorted.forEach(function (top) {
      var date = new Date(top.date + 'T00:00:00');
      var dateDisplay = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      var article = document.createElement('article');
      article.className = 'post-card';
      article.innerHTML =
        '<div class="post-card-icon">' + top.icon + '</div>' +
        '<div class="post-card-body">' +
          '<div class="post-card-meta"><span class="tag">' + top.tag + '</span> ' + dateDisplay + '</div>' +
          '<h2 class="post-card-title"><a href="tops/' + top.url + '">' + top.title + '</a></h2>' +
          '<p class="post-card-excerpt">' + top.excerpt + '</p>' +
        '</div>' +
        '<div class="post-card-arrow">›</div>';
      list.appendChild(article);
    });
  })();
  </script>

  <footer class="site-footer">
    <div class="site-wrapper">
      <p>&copy; 2026 TopPicks. All rights reserved.</p>
      <p>Some links are affiliate links. <a href="#">Privacy Policy</a> · <a href="#">Disclosure</a></p>
    </div>
  </footer>

</body>
</html>
